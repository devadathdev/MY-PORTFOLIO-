<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Custom cursor styling */
        body {
            cursor: url('custom-cursor.png'), auto;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Portfolio</h1>
    </header>
    <main>
        <section id="ventures">
            <h2>My Ventures</h2>
            <div class="venture-card">
                <h3>Venture 1</h3>
                <p>Description of venture 1.</p>
            </div>
            <div class="venture-card">
                <h3>Venture 2</h3>
                <p>Description of venture 2.</p>
            </div>
            <div class="venture-card">
                <h3>Venture 3</h3>
                <p>Description of venture 3.</p>
            </div>
        </section>
        <section id="skills">
            <h2>Skills</h2>
            <ul>
                <li>Skill 1</li>
                <li>Skill 2</li>
                <li>Skill 3</li>
            </ul>
        </section>
        <section id="vision">
            <h2>Vision</h2>
            <p>My vision statement goes here.</p>
        </section>
        <section id="contact">
            <h2>Contact Me</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required><br>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required><br>
                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea><br>
                <input type="submit" value="Send">
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 My Portfolio</p>
    </footer>
    <script>
        // JavaScript for custom cursor and canvas animations
        const canvas = document.createElement('canvas');
        document.body.appendChild(canvas);
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Animation loop
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Custom animation logic here
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
